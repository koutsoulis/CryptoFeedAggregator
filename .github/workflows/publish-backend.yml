name: Publish backend image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Stage backend Docker context
        run: sbt server/Docker/stage

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server/target/docker/stage
          push: true
          tags: |
            ghcr.io/koutsoulis/cryptofeedaggregator-backend:latest
            ghcr.io/koutsoulis/cryptofeedaggregator-backend:${{ github.sha }}
